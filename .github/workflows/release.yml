name: "Release"

on:
  push:
    branches:
      - develop

env:
  COMPOSER_FLAGS: "--no-dev --no-interaction"

jobs:
  build:
    name: Upload Release Asset
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: "Install dependencies"
        run: "composer install --no-dev --optimize-autoloader"

      - name: Archive Release with dependencies
        run: zip -r ${{ github.event.repository.name }}.zip .assets src

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
          GIT_AUTHOR_NAME: ${{ secrets.GIT_USERNAME }}
          GIT_AUTHOR_EMAIL: ${{ secrets.GIT_EMAIL }}
          GIT_COMMITTER_NAME: ${{ secrets.GIT_USERNAME }}
          GIT_COMMITTER_EMAIL: ${{ secrets.GIT_EMAIL }}

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semantic.outputs.new_release_version }}
          token: ${{ secrets.GIT_TOKEN }}
          draft: false
          files: ${{ github.event.repository.name }}.zip