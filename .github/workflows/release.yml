name: "Semantic Release"

on:
  push:
    branches:
      - develop
env:
  WORKING_DIRECTORY: ${{ github.run_id }}-${{github.run_attempt}}
jobs:
  release:
    name: Create a new release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ${{ env.WORKING_DIRECTORY }}

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader -d "${{ env.WORKING_DIRECTORY }}"

      - name: Archive Release with dependencies
        run: cd ${{env.WORKING_DIRECTORY}}/src && zip -r ../../${{ github.event.repository.name }}.zip ./
      - name: Test GitHub API Access
        run: |
          curl -i -H "Authorization: token ${{ secrets.GIT_TOKEN }}" https://api.github.com/repos/gambio/${{github.event.repository.name}}
      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
          GIT_AUTHOR_NAME: ${{ secrets.GIT_USERNAME }}
          GIT_AUTHOR_EMAIL: ${{ secrets.GIT_EMAIL }}
          GIT_COMMITTER_NAME: ${{ secrets.GIT_USERNAME }}
          GIT_COMMITTER_EMAIL: ${{ secrets.GIT_EMAIL }}
        with:
          working_directory: ${{ env.WORKING_DIRECTORY }}
          repository_url: "git@github.com:gambio/${{github.event.repository.name}}.git"
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semantic.outputs.new_release_version }}
          token: ${{ secrets.GIT_TOKEN }}
          draft: false
          files: ${{ github.event.repository.name }}.zip
      - name: Cleanup
        run: |
          echo "Cleaning up..."
          rm -rf ${{ env.WORKING_DIRECTORY }}