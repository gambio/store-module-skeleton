name: "Semantic Release"

on:
  push:
    branches:
      # the main branch of the repo - that varies
      - master
jobs:
  release:
    name: Create a new release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      # optional - only necessary for self-hosted runners
      - name: Schedule cleanup
        uses: git9527/clean-up-action@538a20b07511bcfdd098a786df0c876929144b9a

      - name: Checkout
        uses: actions/checkout@v4

      # optional - only if composer needed
      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v5
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: ${{ vars.GIT_USERNAME }}
          GIT_AUTHOR_EMAIL: ${{ vars.GIT_EMAIL }}
          GIT_COMMITTER_NAME: ${{ vars.GIT_USERNAME }}
          GIT_COMMITTER_EMAIL: ${{ vars.GIT_EMAIL }}

      - name: Generate version_info
        if: steps.semantic.outputs.new_release_version
        run: bash scripts/generate-version-info.sh "${{ steps.semantic.outputs.new_release_version }}"

      - name: Archive Release with dependencies
        if: steps.semantic.outputs.new_release_version
        run: cd ./src && zip -r ../${{ github.event.repository.name }}.zip .

      - name: Upload Release
        if: steps.semantic.outputs.new_release_version
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semantic.outputs.new_release_version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          files: ${{ github.event.repository.name }}.zip
