{extends file="get_usermod:layouts/main/layout.html"}

{block name="content"}
<div class="gx-container breakpoint-small">
	<div class="col-md-12">
        <form id="skeleton-configuration-form" class="form-horizontal" action="" method="post">
            <label for="skeleton-timer">Set timer value: </label>
            <input id="skeleton-timer" value="{$content.timer_value}" type="time" name="skeleton_timer" step="2">
        </form>
	</div>
</div>
{/block}

{block name="bottom_save_bar"}
{load_language_text section="admin_buttons" name="admin_buttons"}
<button class="btn btn-primary" onclick="document.getElementById('skeleton-configuration-form').submit()">Save
</button>
{/block}
