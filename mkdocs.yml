site_name: Gambio Store Module Documentation
site_url: https://developers.gambio.de/store-module-skeleton/
docs_dir: ./docs/en
site_dir: ./site/en
copyright: Copyright &copy; 2026 Gambio GmbH
theme:
  name: material
  custom_dir: html
  favicon: favicon.ico
  logo: logo.svg
  language: en
  palette:
    - media: "(prefers-color-scheme)"
      scheme: gambio
      toggle:
        icon: material/brightness-auto
        name: Switch to dark mode
    - media: "(prefers-color-scheme: light)"
      scheme: gambio
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: yellow
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - toc.autohide
    - navigation.expand
    - toc.integrate
    - navigation.top
extra:
  alternate:
    - name: English
      link: /store-module-skeleton/
      lang: en
    - name: Deutsch
      link: /store-module-skeleton/de/
      lang: de
  generator: false
  social:
    - icon: gambio/white
      link: https://www.gambio-support.de
      name: Gambio Kundenportal
    - icon: fontawesome/brands/github
      link: https://github.com/gambio/store-module-skeleton
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/gambio-gmbh
extra_css:
  - assets/css/extra.css
markdown_extensions:
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.smartsymbols
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      options:
        custom_icons:
          - html/.icons
  - def_list
  - footnotes
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - toc:
      toc_depth: 4
      permalink: true
plugins:
  - search:
      lang: en
nav:
  - Home: index.md
  - Module Development Guide: module-development-guide.md
  - GXModule.json Reference: gxmodule-json-reference.md
  - store.json Reference: store-json-reference.md
  - Local Testing: local-testing.md
  - Publishing Guide: publishing-guide.md
  - Release Checklist: release-checklist.md
  - Smarty Blocks Reference: smarty-blocks-reference.md
